<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'" />
<title>NoType</title>
<style>
  :root {
    --card: #ffffff; --border: #d4d4d8; --t1: #27272a; --t3: #a1a1aa;
    --red: #dc2626; --green: #16a34a; --amber: #d97706; --ink: #18181b;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: transparent; overflow: hidden;
    font-family: "Segoe UI", "Microsoft JhengHei", system-ui, sans-serif; -webkit-user-select: none; }
  #ov {
    width: 230px; height: 70px; margin: 3px auto 0;
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    box-shadow: 0 12px 34px rgba(0,0,0,0.18);
    display: flex; align-items: center; gap: 13px; padding: 0 16px;
    animation: pop .28s cubic-bezier(.2,.9,.3,1.3);
  }
  @keyframes pop { from { transform: translateY(8px) scale(.95); opacity: 0 } to { transform: none; opacity: 1 } }
  .ico { flex: none; width: 26px; display: flex; justify-content: center; }
  .txt { font-size: 14px; font-weight: 600; color: var(--t1); line-height: 1.2; }
  .txt small { display: block; font-weight: 400; color: var(--t3); font-size: 11px; margin-top: 2px; }

  /* recording */
  .bars { display: flex; align-items: flex-end; gap: 3px; height: 24px; }
  .bars i { width: 3px; background: var(--red); border-radius: 2px; display: block; animation: w 1s ease-in-out infinite; }
  .bars i:nth-child(1){height:8px;animation-delay:0s}
  .bars i:nth-child(2){height:18px;animation-delay:.15s}
  .bars i:nth-child(3){height:24px;animation-delay:.3s}
  .bars i:nth-child(4){height:13px;animation-delay:.45s}
  .bars i:nth-child(5){height:19px;animation-delay:.6s}
  @keyframes w { 0%,100%{transform:scaleY(.35)} 50%{transform:scaleY(1)} }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); animation: blink 1s infinite; display: inline-block; margin-left: 5px; vertical-align: middle; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

  /* spinner */
  .spin { width: 22px; height: 22px; border-radius: 50%; border: 2.5px solid #e4e4e7; border-top-color: var(--ink); animation: rot .8s linear infinite; }
  .spin.amber { border-top-color: var(--amber); }
  @keyframes rot { to { transform: rotate(360deg) } }

  .badge { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 900; font-size: 14px; animation: pop .3s; }
  .badge.ok { background: var(--green); }
  .badge.err { background: var(--red); }
  .badge.tog { background: var(--ink); font-size: 14px; }
</style>
</head>
<body>
  <div id="ov"><div class="ico" id="ico"></div><div class="txt" id="txt"></div></div>
  <script>
    const STATES = {
      recording: {
        ico: '<div class="bars"><i></i><i></i><i></i><i></i><i></i></div>',
        txt: '錄音中<span class="dot"></span>', sub: '放開 F9 結束',
      },
      processing: { ico: '<div class="spin"></div>', txt: '辨識中…', sub: '語音轉文字' },
      polishing: { ico: '<div class="spin amber"></div>', txt: '潤稿中…', sub: 'AI 整理文字' },
      done: { ico: '<div class="badge ok">✓</div>', txt: '完成', sub: '' },
      error: { ico: '<div class="badge err">✕</div>', txt: '發生錯誤', sub: '請檢查設定或網路' },
      toggle: { ico: '<div class="badge tog">⏎</div>', txt: '即時送出', sub: '' },
    };
    function render(state, detail) {
      const st = STATES[state] || STATES.processing;
      document.getElementById('ico').innerHTML = st.ico;
      const sub = detail || st.sub;
      document.getElementById('txt').innerHTML = st.txt + (sub ? '<small>' + sub + '</small>' : '');
    }
    if (window.overlayApi) {
      window.overlayApi.onState((state, detail) => render(state, detail));
    }
    render('recording');
  </script>
</body>
</html>
