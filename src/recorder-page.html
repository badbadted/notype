<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'" />
<title>recorder</title>
</head>
<body>
<script>
  // 在隱藏視窗中執行 MediaRecorder（主程序無法直接存取麥克風）
  let mediaRecorder = null;
  let chunks = [];
  let stream = null;
  // 冷啟動競態防護（H5）：getUserMedia 期間若 stop 先到，記住 stopRequested，
  // 待麥克風 ready 後立刻停止，避免短按導致麥克風持續開啟、流程卡在錄音中。
  let starting = false;
  let stopRequested = false;

  function pickMime() {
    const prefs = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus'];
    for (const m of prefs) {
      if (window.MediaRecorder && MediaRecorder.isTypeSupported(m)) return m;
    }
    return '';
  }

  async function start() {
    if (starting) return;
    starting = true;
    stopRequested = false;
    try {
      chunks = [];
      stream = await navigator.mediaDevices.getUserMedia({ audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true } });
      // getUserMedia 期間若已收到 stop（短按）→ 不啟動 recorder，釋放麥克風並回送空音訊讓主程序收尾
      if (stopRequested) {
        releaseStream();
        window.recApi.sendAudio(new Uint8Array(0));
        return;
      }
      const mimeType = pickMime();
      mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : undefined);
      mediaRecorder.ondataavailable = (e) => { if (e.data && e.data.size > 0) chunks.push(e.data); };
      mediaRecorder.onstop = onStop;
      mediaRecorder.start();
    } catch (err) {
      window.recApi.reportError('麥克風存取失敗：' + (err && err.message ? err.message : err));
    } finally {
      starting = false;
    }
  }

  async function onStop() {
    try {
      const blob = new Blob(chunks, { type: chunks[0] ? chunks[0].type : 'audio/webm' });
      const ab = await blob.arrayBuffer();
      window.recApi.sendAudio(new Uint8Array(ab));
    } catch (err) {
      window.recApi.reportError('音訊封裝失敗：' + (err && err.message ? err.message : err));
    } finally {
      releaseStream();
    }
  }

  function stop() {
    // 麥克風仍在初始化（getUserMedia 未完成）→ 標記待停，由 start() ready 後處理
    if (starting) {
      stopRequested = true;
      return;
    }
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      mediaRecorder.stop(); // → onStop 送出音訊
    } else {
      // 沒有進行中的錄音（例如 start 從未啟動）→ 釋放並回送空音訊讓主程序收尾，避免 overlay 卡錄音中
      releaseStream();
      window.recApi.sendAudio(new Uint8Array(0));
    }
  }

  function releaseStream() {
    if (stream) { stream.getTracks().forEach((t) => t.stop()); stream = null; }
  }

  window.recApi.onStart(start);
  window.recApi.onStop(stop);
</script>
</body>
</html>
